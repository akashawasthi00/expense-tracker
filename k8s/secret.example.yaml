# TEMPLATE ONLY — do NOT commit a real secret.
# Create the real secret imperatively (recommended) so secrets never land in git:
#
#   kubectl create secret generic app-secrets -n expense-tracker \
#     --from-literal=ConnectionStrings__DefaultConnection="Server=<RDS-ENDPOINT>,1433;Database=ExpenseTrackerApi;User Id=admin;Password=<PASSWORD>;TrustServerCertificate=True" \
#     --from-literal=Jwt__Key="<A-LONG-RANDOM-32+-BYTE-SECRET>"
#
# This file documents the shape the Deployment expects.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: expense-tracker
type: Opaque
stringData:
  # Keys match ASP.NET Core configuration paths (':' -> '__').
  ConnectionStrings__DefaultConnection: "Server=REPLACE_RDS_ENDPOINT,1433;Database=ExpenseTrackerApi;User Id=admin;Password=REPLACE_ME;TrustServerCertificate=True"
  Jwt__Key: "REPLACE_WITH_A_LONG_RANDOM_SECRET_AT_LEAST_32_BYTES"
